<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Redirecting...</title>
  <script>
    const day = new Date().toLocaleString('en-US', { weekday: 'long' }).toLowerCase();

    // Define your schedule links here
    const links = {
      monday: "http://rewordify.com/schoolclock.php?p=08:15=Connections;08:40=Prep;09:29=9B;10:20=Prep;10:35=8th;11:27=Lunch Recess;12:15=6th;13:07=Prep;13:59=9F;14:50=Prep;15:45=End of School",
      tuesday: "http://rewordify.com/schoolclock.php?p=08:15=Connections;08:40=Prep;09:29=9B;10:20=Prep;10:35=8th;11:27=Lunch Recess;12:08=6th;13:00=Prep;13:59=9F;14:50=Prep;15:45=End of School",
      wednesday: "http://rewordify.com/schoolclock.php?p=08:15=Connections;08:40=Prep;09:29=9B;10:20=Prep;10:35=8th;11:27=Lunch Recess;12:15=6th;13:07=Prep;13:59=9F;14:50=Prep;15:45=End of School",
      thursday: "http://rewordify.com/schoolclock.php?p=08:30=9F;09:50=Prep;10:35=8th;11:27=Lunch Recess;12:08=6th;13:00=Prep;15:45=End of School",
      friday: "http://rewordify.com/schoolclock.php?p=08:30=9F;09:53=Prep;10:45=Lunch Recess;11:16=6th;11:51=Prep;12:32=8th;13:07=Prep;13:45=End of School"
    };

    if (links[day]) {
      window.location.replace(links[day]);
    } else {
      document.body.innerHTML = `<p>No schedule link defined for today: ${day}</p>`;
    }
  </script>
</head>
<body>
  <p>Redirecting to today's schedule...</p>
</body>
</html>
